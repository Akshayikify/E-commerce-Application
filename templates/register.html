<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Register</title>
</head>
<body class="bg-light">
    <div class="container d-flex min-vh-100 align-items-center justify-content-center ">
        <div class="card p-4 shadow-sm" style="width:100%; max-width: 450px;">
            <h2 class="text-center mb-4 fw-bold text-primary">Create Account</h2>
            
            <form method="post" class="row g-3" novalidate>
                {% csrf_token %}
                {% load widget_tweaks %}
                
                {% for field in form %}
                    <div class="col-12 mb-2">
                        <label for="{{ field.id_for_label }}" class="form-label fw-semibold text-secondary">
                            {{ field.label }}
                        </label>
                        {% render_field field class="form-control" placeholder=field.label %}
                        
                        {% if field.errors %}
                            {% for error in field.errors %}
                                <div class="text-danger small mt-1">{{ error }}</div>
                            {% endfor %}
                        {% endif %}
                    </div>
                {% endfor %}
                
                <div class="col-12">
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-2 fw-bold">Register</button>
                </div>
            </form>
            
            <hr class="text-muted my-4">
            <p class="text-center text-muted mb-0"> Already have an account? <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">Login</a></p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
