{% extends 'home.html' %}
{% block title %}Product-{{product.title}}{% endblock %}
{% block products %}
<div class="card mb-3" style="max-width: 540px;">
  <div class="row g-0">
    <div class="col-md-4">
      <img src="{{ product.product_image.url }}" class="img-fluid rounded-start" alt="{{ product.title }}">
    </div>
    <div class="col-md-8">
      <div class="card-body">
        <h5 class="card-title">{{ product.title }}/{{ translation }}</h5>
        <p class="card-text">{{ product.description }}</p>
        {% if user.is_authenticated %}
            <div  class="d-flex gap-2">
            <a href="#" class="btn btn-primary">Add to Cart</a>
            <a href="#" class="btn btn-warning text-dark">Buy Now</a>
            </div>
        {% else %}
            <div  class="d-flex gap-2">
            <a href="{% url 'register' %}" class="btn btn-primary">Add to Cart</a>
            <a href="{% url 'register' %}" class="btn btn-warning text-dark">Buy Now</a>
            </div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
